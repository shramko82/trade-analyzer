<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;padding:1.5rem}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:15px;font-weight:500;margin-bottom:.5rem;color:#555}
.steps{display:flex;gap:6px;margin-bottom:1.5rem;align-items:center}
.step-dot{height:4px;flex:1;border-radius:2px;background:#ddd}
.step-dot.active{background:#1a1a1a}
.step-dot.done{background:#1a9e70}
.step-lbl{font-size:11px;color:#888;white-space:nowrap}
.wrap{max-width:800px;margin:0 auto;background:#fff;border-radius:14px;padding:1.5rem;border:0.5px solid #e0e0e0}
.upload-zone{border:1.5px dashed #ccc;border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;margin-bottom:1rem;transition:background .15s}
.upload-zone:hover{background:#f9f9f7}
.upload-zone input{display:none}
.file-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.chip{background:#f5f5f3;border:0.5px solid #e0e0e0;border-radius:8px;padding:3px 8px;font-size:12px;display:flex;align-items:center;gap:5px}
.rm{cursor:pointer;color:#c33;font-size:13px;line-height:1}
.btn{padding:.45rem .9rem;border:0.5px solid #ccc;border-radius:8px;background:transparent;font-size:13px;cursor:pointer;font-weight:500;color:#1a1a1a}
.btn:hover{background:#f5f5f3}
.btn:disabled{opacity:.4;cursor:default}
.btn-full{width:100%;padding:.55rem}
.btn-green{border-color:#1a9e70;color:#1a9e70}
.seg{display:flex;gap:6px;margin-bottom:1rem}
.seg-btn{flex:1;padding:.45rem;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;background:transparent;color:#888}
.seg-btn.on{border-color:#1a9e70;color:#1a9e70;background:rgba(26,158,112,.06)}
.card{border:0.5px solid #e0e0e0;border-radius:10px;padding:.75rem 1rem;margin-bottom:.75rem}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:1rem 0}
.mc{background:#f5f5f3;border-radius:8px;padding:.6rem .9rem}
.mc .lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mc .val{font-size:19px;font-weight:500}
.pos{color:#1a9e70}.neg{color:#c94040}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:0.5px solid #e0e0e0}
.tab{padding:.45rem 1rem;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.on{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 6px;border-bottom:1px solid #e0e0e0;color:#888;font-weight:500}
td{padding:5px 6px;border-bottom:0.5px solid #f0f0f0}
.section{margin-bottom:1.5rem}
.bdg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:11px;margin:1px;font-weight:500}
.chart-wrap{position:relative;width:100%;height:200px;margin:.5rem 0}
hr{border:none;border-top:0.5px solid #e0e0e0;margin:.75rem 0}
.tog{width:34px;height:18px;border-radius:9px;background:#ccc;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.tog.on{background:#1a9e70}
.tog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.tog.on::after{left:18px}
.row{display:flex;align-items:center;gap:8px}
select{font-size:12px;padding:2px 4px;border:0.5px solid #ccc;border-radius:4px;background:#fff;color:#1a1a1a}
input[type=text]{font-size:13px;padding:3px 6px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GCOLS=['#3a7bd5','#1a9e70','#e07b39','#9c59d1','#c94040','#e0a020','#888'];
const TCOLS={ES:{bg:'#d4e9f7',fg:'#0a4c7a'},GC:{bg:'#faecd0',fg:'#7a4e00'},BTC:{bg:'#e6d8f5',fg:'#4a1a80'},CL:{bg:'#d8f0d8',fg:'#1a5c1a'},NQ:{bg:'#fde8d8',fg:'#7a2e00'},MNQ:{bg:'#fde8d8',fg:'#7a2e00'}};
const charts={};

let S={
  step:1,mode:'single',
  rawFiles:{},strategies:[],
  groups:[{id:'g0',name:'Група 1',ci:0,sids:[]},{id:'g1',name:'Група 2',ci:1,sids:[]}],
  rotEnabled:false,rotPeriod:'monthly',rotGrpA:'g0',rotGrpB:'g1',
  accGrps:{A:['g0'],B:['g1']}
};

function tickerOf(name){const m=name.match(/^([A-Z]+)_/);return m?m[1]:name.replace(/\.csv$/i,'').split('_')[0];}
function parseDate(s){if(!s)return null;const d=new Date(s.trim().replace(' ','T'));return isNaN(d)?null:d;}
function tradingDay(dt){if(!dt)return'?';return dt.toISOString().slice(0,10);}
function fmt(v){return(v>=0?'+':'')+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pclr(v){return v>=0?'#1a9e70':'#c94040';}
function bdg(tk,lbl){const c=TCOLS[tk]||{bg:'#ebebeb',fg:'#555'};return`<span class="bdg" style="background:${c.bg};color:${c.fg}">${lbl||tk}</span>`;}
function gid(){return'g'+Date.now()+Math.random().toString(36).slice(2,6);}

function parseFile(filename,file,cb){
  Papa.parse(file,{header:true,skipEmptyLines:true,dynamicTyping:true,complete(res){
    const ticker=tickerOf(filename),trades=[];
    res.data.forEach(r=>{
      const type=(r['Type']||r['type']||'').toString().trim().toLowerCase();
      if(!type.includes('exit'))return;
      const dt=parseDate(r['Date and time']||r['date and time']||r['Date']);
      const pnl=parseFloat(r['Net P&L USD']||r['Net P&L']||0);
      if(dt&&!isNaN(pnl))trades.push({dt,pnl,day:tradingDay(dt)});
    });
    trades.sort((a,b)=>a.dt-b.dt);
    cb({id:gid(),filename,ticker,trades});
  }});
}

function analyze(tradeGroups){
  const all=[];
  tradeGroups.forEach(g=>g.trades.forEach(t=>all.push({...t,ticker:g.ticker})));
  all.sort((a,b)=>a.dt-b.dt);
  if(!all.length)return null;
  let cum=0;
  const equity=all.map(t=>{cum+=t.pnl;return parseFloat(cum.toFixed(2));});
  const wins=all.filter(t=>t.pnl>0),losses=all.filter(t=>t.pnl<0);
  const avgWin=wins.length?(wins.reduce((s,t)=>s+t.pnl,0)/wins.length):0;
  const avgLoss=losses.length?(losses.reduce((s,t)=>s+t.pnl,0)/losses.length):0;
  let pk=0,pkIdx=0;const ddList=[];
  for(let i=0;i<equity.length;i++){
    if(equity[i]>=pk){pk=equity[i];pkIdx=i;}
    const draw=pk-equity[i];
    if(draw>0){
      const last=ddList[ddList.length-1];
      if(last&&last.pkIdx===pkIdx){if(draw>last.depth){last.depth=draw;last.botIdx=i;}}
      else ddList.push({pkIdx,botIdx:i,depth:draw});
    }
  }
  ddList.sort((a,b)=>b.depth-a.depth);
  const top5dd=ddList.slice(0,5).map(dd=>{
    const seg=all.slice(dd.pkIdx+1,dd.botIdx+1);
    const tmap={};seg.forEach(t=>{tmap[t.ticker]=(tmap[t.ticker]||0)+t.pnl;});
    return{...dd,tmap,startDate:all[dd.pkIdx]?.dt.toISOString().slice(0,10),botDate:all[dd.botIdx]?.dt.toISOString().slice(0,10)};
  });
  const dayMap={};
  all.forEach(t=>{
    if(!dayMap[t.day])dayMap[t.day]={pnl:0,tickers:{}};
    dayMap[t.day].pnl+=t.pnl;
    dayMap[t.day].tickers[t.ticker]=(dayMap[t.day].tickers[t.ticker]||0)+t.pnl;
  });
  const days=Object.entries(dayMap).map(([d,v])=>({day:d,pnl:v.pnl,tickers:v.tickers}));
  days.sort((a,b)=>a.pnl-b.pnl);
  const tickerMap={};
  all.forEach(t=>{
    if(!tickerMap[t.ticker])tickerMap[t.ticker]={pnl:0,count:0,wins:0};
    tickerMap[t.ticker].pnl+=t.pnl;tickerMap[t.ticker].count++;
    if(t.pnl>0)tickerMap[t.ticker].wins++;
  });
  return{all,equity,totalPnl:cum,count:all.length,
    winRate:(wins.length/all.length*100).toFixed(1),avgWin,avgLoss,
    top5dd,worst5:days.slice(0,5),best5:days.slice(-5).reverse(),tickerMap};
}

function buildPeriods(startDt){
  const periods=[],end=new Date();end.setMonth(end.getMonth()+2);
  let d=new Date(startDt);
  while(d<end){
    const s=new Date(d);
    if(S.rotPeriod==='monthly'){d=new Date(d);d.setMonth(d.getMonth()+1);d.setDate(1);}
    else{d=new Date(d);d.setDate(d.getDate()+7);}
    periods.push({s,e:new Date(d)});
  }
  return periods;
}
function periodIdx(dt,periods){for(let i=0;i<periods.length;i++)if(dt>=periods[i].s&&dt<periods[i].e)return i;return 0;}

function getAccountTrades(accId){
  if(S.mode==='single')return S.strategies.map(s=>({ticker:s.ticker,trades:s.trades}));
  if(!S.rotEnabled){
    const res=[];
    (S.accGrps[accId]||[]).forEach(gi=>{
      const g=S.groups.find(x=>x.id===gi);if(!g)return;
      g.sids.forEach(sid=>{const str=S.strategies.find(x=>x.id===sid);if(str)res.push({ticker:str.ticker,trades:str.trades});});
    });
    return res;
  }
  const grpA=S.groups.find(g=>g.id===S.rotGrpA);
  const grpB=S.groups.find(g=>g.id===S.rotGrpB);
  if(!grpA||!grpB)return[];
  const grpTrades=grp=>{const arr=[];grp.sids.forEach(sid=>{const s=S.strategies.find(x=>x.id===sid);if(s)s.trades.forEach(t=>arr.push({...t,ticker:s.ticker}));});return arr;};
  const tA=grpTrades(grpA).map(t=>({...t,src:'A'}));
  const tB=grpTrades(grpB).map(t=>({...t,src:'B'}));
  const all=[...tA,...tB].sort((a,b)=>a.dt-b.dt);
  if(!all.length)return[];
  const periods=buildPeriods(all[0].dt);
  const filtered=all.filter(t=>{
    const pi=periodIdx(t.dt,periods);
    const even=pi%2===0;
    if(accId==='A')return even?t.src==='A':t.src==='B';
    return even?t.src==='B':t.src==='A';
  });
  const grouped={};
  filtered.forEach(t=>{if(!grouped[t.ticker])grouped[t.ticker]=[];grouped[t.ticker].push({dt:t.dt,pnl:t.pnl,day:t.day});});
  return Object.entries(grouped).map(([ticker,trades])=>({ticker,trades}));
}

function renderAccountBlock(tg,cid){
  const data=analyze(tg);
  const c=document.getElementById(cid);
  if(!c)return;
  if(!data||!data.count){c.innerHTML='<p style="color:#888;font-size:13px;padding:.5rem 0">Немає трейдів.</p>';return;}
  c.innerHTML=`
    <div class="metrics" id="${cid}_m"></div>
    <div class="section"><h3>Equity curve</h3><div class="chart-wrap"><canvas id="${cid}_cv"></canvas></div></div>
    <div class="section"><h3>Топ-5 просадок</h3>
      <table><thead><tr><th>#</th><th>Пік</th><th>Дно</th><th>Просадка $</th><th>Розшифровка</th></tr></thead><tbody id="${cid}_dd"></tbody></table></div>
    <div class="section"><h3>Топ-5 найгірших днів</h3>
      <table><thead><tr><th>День</th><th>PnL</th><th>Розшифровка</th></tr></thead><tbody id="${cid}_bd"></tbody></table></div>
    <div class="section"><h3>Топ-5 найкращих днів</h3>
      <table><thead><tr><th>День</th><th>PnL</th><th>Розшифровка</th></tr></thead><tbody id="${cid}_gd"></tbody></table></div>
    <div class="section"><h3>По тікерах</h3>
      <table><thead><tr><th>Тікер</th><th>Трейдів</th><th>PnL</th><th>Win%</th></tr></thead><tbody id="${cid}_tk"></tbody></table></div>
    <div class="section"><h3>Останні 20 трейдів</h3>
      <table><thead><tr><th>Дата закриття</th><th>Тікер</th><th>Net PnL</th><th>Cumulative</th></tr></thead><tbody id="${cid}_l20"></tbody></table></div>`;

  document.getElementById(cid+'_m').innerHTML=`
    <div class="mc"><div class="lbl">PnL</div><div class="val ${data.totalPnl>=0?'pos':'neg'}">${fmt(data.totalPnl)}</div></div>
    <div class="mc"><div class="lbl">Трейдів</div><div class="val">${data.count}</div></div>
    <div class="mc"><div class="lbl">Win rate</div><div class="val">${data.winRate}%</div></div>
    <div class="mc"><div class="lbl">Avg win</div><div class="val pos">+${data.avgWin.toFixed(2)}</div></div>
    <div class="mc"><div class="lbl">Avg loss</div><div class="val neg">${data.avgLoss.toFixed(2)}</div></div>`;

  if(charts[cid])charts[cid].destroy();
  const clr=data.totalPnl>=0?'#1a9e70':'#c94040';
  charts[cid]=new Chart(document.getElementById(cid+'_cv'),{
    type:'line',
    data:{labels:data.all.map(t=>t.dt.toISOString().slice(0,10)),datasets:[{data:data.equity,borderColor:clr,borderWidth:1.5,pointRadius:0,fill:{target:'origin',above:'rgba(26,158,112,.07)',below:'rgba(201,64,64,.07)'}}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:6,autoSkip:true,maxRotation:0},grid:{display:false}},y:{ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(128,128,128,.1)'}}}}
  });

  const ddb=document.getElementById(cid+'_dd');
  data.top5dd.forEach((dd,i)=>{
    const b=Object.entries(dd.tmap).map(([t,v])=>bdg(t,`${t}: ${fmt(v)}`)).join('');
    ddb.innerHTML+=`<tr><td>${i+1}</td><td>${dd.startDate||'-'}</td><td>${dd.botDate||'-'}</td><td style="color:#c94040;font-weight:500">-${dd.depth.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td><td>${b||'-'}</td></tr>`;
  });

  const fillDayTbl=(id,arr)=>{
    const tb=document.getElementById(id);
    arr.forEach(d=>{
      const b=Object.entries(d.tickers).map(([t,v])=>bdg(t,`${t}: ${fmt(v)}`)).join('');
      tb.innerHTML+=`<tr><td>${d.day}</td><td style="color:${pclr(d.pnl)};font-weight:500">${fmt(d.pnl)}</td><td>${b}</td></tr>`;
    });
  };
  fillDayTbl(cid+'_bd',data.worst5);
  fillDayTbl(cid+'_gd',data.best5);

  const tkb=document.getElementById(cid+'_tk');
  Object.entries(data.tickerMap).sort((a,b)=>b[1].pnl-a[1].pnl).forEach(([t,v])=>{
    tkb.innerHTML+=`<tr><td>${bdg(t)}</td><td>${v.count}</td><td style="color:${pclr(v.pnl)};font-weight:500">${fmt(v.pnl)}</td><td>${(v.wins/v.count*100).toFixed(1)}%</td></tr>`;
  });

  const last20=data.all.slice(-20).reverse();
  const l20el=document.getElementById(cid+'_l20');
  last20.forEach((t,i)=>{
    const eqVal=data.equity[data.all.length-1-i];
    l20el.innerHTML+=`<tr>
      <td style="color:#888;font-size:11px">${t.dt.toISOString().replace('T',' ').slice(0,16)}</td>
      <td>${bdg(t.ticker)}</td>
      <td style="color:${pclr(t.pnl)};font-weight:500">${fmt(t.pnl)}</td>
      <td style="color:${pclr(eqVal)}">${fmt(eqVal)}</td>
    </tr>`;
  });
}

function stepDots(){
  const names=S.mode==='single'?['Завантаження','Результати']:['Завантаження','Групи','Акаунти','Результати'];
  const maxStep=names.length;
  const curVisual=S.mode==='single'?(S.step===1?1:2):(S.step<=4?S.step:4);
  return names.map((_,i)=>{
    const n=i+1,cls=n<curVisual?'done':n===curVisual?'active':'';
    return`<div class="step-dot ${cls}"></div>`;
  }).join('')+'<span class="step-lbl">'+names[Math.min(curVisual,maxStep)-1]+'</span>';
}

function step1HTML(){
  const chips=Object.keys(S.rawFiles).map(k=>`<div class="chip">${bdg(tickerOf(k))} <span style="font-size:11px">${k}</span> <span class="rm" data-rm="${k}">✕</span></div>`).join('');
  const hasFiles=Object.keys(S.rawFiles).length>0;
  return`<h2>Завантаження стратегій</h2>
  <div class="upload-zone" id="dz" onclick="document.getElementById('fi').click()">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <p style="color:#888;font-size:12px;margin-top:.3rem">Завантажити CSV з TradingView (кілька файлів)</p>
    <p style="font-size:11px;color:#aaa;margin-top:4px">Клацни або перетягни сюди</p>
    <input type="file" id="fi" multiple accept=".csv">
  </div>
  <div class="file-list">${chips}</div>
  <p style="font-size:12px;color:#888;margin-bottom:.5rem">Режим:</p>
  <div class="seg">
    <div class="seg-btn ${S.mode==='single'?'on':''}" data-mode="single">Один рахунок</div>
    <div class="seg-btn ${S.mode==='multi'?'on':''}" data-mode="multi">Два рахунки / групи</div>
  </div>
  <button class="btn btn-full btn-green" id="btn-next" ${hasFiles?'':'disabled'}>${S.mode==='single'?'Розрахувати →':'Далі: групи →'}</button>`;
}

function step2HTML(){
  const stratRows=S.strategies.map(s=>{
    const ag=S.groups.find(g=>g.sids.includes(s.id));
    const opts=S.groups.map(g=>`<option value="${g.id}" ${ag?.id===g.id?'selected':''}>${g.name}</option>`).join('')+`<option value="" ${!ag?'selected':''}>— без групи —</option>`;
    return`<div class="row" style="padding:4px 0">
      ${bdg(s.ticker)} <span style="flex:1;font-size:12px;color:#888">${s.filename}</span>
      <select data-sid="${s.id}" class="gsel">${opts}</select></div>`;
  }).join('');
  const grpCards=S.groups.map(g=>{
    const strs=S.strategies.filter(s=>g.sids.includes(s.id));
    const col=GCOLS[g.ci%GCOLS.length];
    return`<div class="card">
      <div class="row" style="margin-bottom:4px">
        <span class="dot" style="background:${col}"></span>
        <input type="text" class="gnm" data-gid="${g.id}" value="${g.name}" style="flex:1;border:none;background:transparent;font-size:13px;font-weight:500;outline:none">
        ${S.groups.length>1?`<span class="rm" data-rmg="${g.id}" style="font-size:11px">видалити</span>`:''}
      </div>
      <p style="font-size:12px;color:#888">${strs.length?strs.map(s=>bdg(s.ticker)).join(''):'— порожня —'} (${strs.length} стратегій)</p>
    </div>`;
  }).join('');
  return`<h2>Розподіл по групах</h2>
  <div style="margin-bottom:1rem">${stratRows}</div>
  <hr>
  <div class="row" style="margin-bottom:.5rem"><h3 style="margin:0;flex:1">Групи</h3><button class="btn" id="btn-ag" style="font-size:11px;padding:2px 8px">+ Додати групу</button></div>
  ${grpCards}
  <div class="row" style="margin-top:1rem;gap:8px">
    <button class="btn" id="btn-back">← Назад</button>
    <button class="btn btn-full btn-green" id="btn-next">Далі: акаунти →</button>
  </div>`;
}

function step3HTML(){
  const grpOpts=(sel)=>S.groups.map(g=>`<option value="${g.id}" ${g.id===sel?'selected':''}>${g.name}</option>`).join('');
  const rotBlock=S.rotEnabled?`
    <div style="margin-top:.75rem">
      <div class="row" style="margin-bottom:.5rem;font-size:12px;color:#888">Рахунок A починає з:</div>
      <select id="rot-a">${grpOpts(S.rotGrpA)}</select>
      <p style="font-size:11px;color:#aaa;margin-top:4px">Рахунок B стартує з іншої групи. Далі — чергуються.</p>
      <div class="row" style="margin-top:.75rem;margin-bottom:.3rem;font-size:12px;color:#888">Період ротації:</div>
      <div class="seg" style="max-width:280px">
        <div class="seg-btn ${S.rotPeriod==='weekly'?'on':''}" data-period="weekly">Тижнева</div>
        <div class="seg-btn ${S.rotPeriod==='monthly'?'on':''}" data-period="monthly">Місячна</div>
      </div>
    </div>`:
    ['A','B'].map(acc=>{
      const rows=S.groups.map(g=>`<div class="row" style="padding:3px 0;font-size:13px">
        <input type="checkbox" data-acc="${acc}" data-gid="${g.id}" ${(S.accGrps[acc]||[]).includes(g.id)?'checked':''}>
        <span class="dot" style="background:${GCOLS[g.ci%GCOLS.length]}"></span> ${g.name}
      </div>`).join('');
      return`<div class="card"><p style="font-weight:500;margin-bottom:.4rem;font-size:13px">Рахунок ${acc}</p>${rows}</div>`;
    }).join('');
  return`<h2>Налаштування рахунків</h2>
  <div class="row" style="margin-bottom:.75rem">
    <div class="tog ${S.rotEnabled?'on':''}" id="rot-tog"></div>
    <span style="font-size:13px">Ротація груп між рахунками</span>
  </div>
  ${rotBlock}
  <div class="row" style="margin-top:1rem;gap:8px">
    <button class="btn" id="btn-back">← Назад</button>
    <button class="btn btn-full btn-green" id="btn-next">Розрахувати →</button>
  </div>`;
}

function step4HTML(){
  const multi=S.mode==='multi';
  const tabs=multi?`<div class="tabs">
    <div class="tab on" data-tab="A">Рахунок A</div>
    <div class="tab" data-tab="B">Рахунок B</div>
    <div class="tab" data-tab="all">Всі разом</div>
  </div>`:'';
  return`<h2>${multi?'Результати по рахунках':'Результати'}</h2>
  ${tabs}
  <div id="pA" class="acc-panel"></div>
  ${multi?'<div id="pB" class="acc-panel" style="display:none"></div><div id="pall" class="acc-panel" style="display:none"></div>':''}
  <button class="btn btn-full" id="btn-back" style="margin-top:1rem">← Назад</button>`;
}

function render(){
  const app=document.getElementById('app');
  let html='';
  if(S.step===1)html=step1HTML();
  else if(S.step===2&&S.mode==='multi')html=step2HTML();
  else if(S.step===3&&S.mode==='multi')html=step3HTML();
  else html=step4HTML();
  app.innerHTML=`<div class="steps">${stepDots()}</div>${html}`;
  bind();
  if((S.mode==='single'&&S.step===2)||(S.mode==='multi'&&S.step===4)){
    setTimeout(()=>{
      if(S.mode==='single'){
        renderAccountBlock(S.strategies.map(s=>({ticker:s.ticker,trades:s.trades})),'pA');
      } else {
        renderAccountBlock(getAccountTrades('A'),'pA');
        renderAccountBlock(getAccountTrades('B'),'pB');
        renderAccountBlock(S.strategies.map(s=>({ticker:s.ticker,trades:s.trades})),'pall');
      }
    },50);
  }
}

function bind(){
  const fi=document.getElementById('fi');
  if(fi)fi.addEventListener('change',e=>{[...e.target.files].forEach(f=>S.rawFiles[f.name]=f);render();});
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>e.preventDefault());
    dz.addEventListener('drop',e=>{e.preventDefault();[...e.dataTransfer.files].forEach(f=>S.rawFiles[f.name]=f);render();});
  }
  document.querySelectorAll('.rm[data-rm]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();delete S.rawFiles[el.dataset.rm];
    S.strategies=S.strategies.filter(s=>s.filename!==el.dataset.rm);
    S.groups.forEach(g=>g.sids=g.sids.filter(id=>S.strategies.find(s=>s.id===id)));
    render();
  }));
  document.querySelectorAll('.seg-btn[data-mode]').forEach(el=>el.addEventListener('click',()=>{S.mode=el.dataset.mode;render();}));
  document.querySelectorAll('.seg-btn[data-period]').forEach(el=>el.addEventListener('click',()=>{S.rotPeriod=el.dataset.period;render();}));
  document.querySelectorAll('.gsel').forEach(el=>el.addEventListener('change',()=>{
    const sid=el.dataset.sid;
    S.groups.forEach(g=>g.sids=g.sids.filter(x=>x!==sid));
    if(el.value)S.groups.find(g=>g.id===el.value)?.sids.push(sid);
    render();
  }));
  document.querySelectorAll('.gnm').forEach(el=>el.addEventListener('input',()=>{const g=S.groups.find(x=>x.id===el.dataset.gid);if(g)g.name=el.value;}));
  document.querySelectorAll('.rm[data-rmg]').forEach(el=>el.addEventListener('click',()=>{S.groups=S.groups.filter(g=>g.id!==el.dataset.rmg);render();}));
  const bag=document.getElementById('btn-ag');
  if(bag)bag.addEventListener('click',()=>{S.groups.push({id:gid(),name:`Група ${S.groups.length+1}`,ci:S.groups.length%GCOLS.length,sids:[]});render();});
  const rt=document.getElementById('rot-tog');
  if(rt)rt.addEventListener('click',()=>{S.rotEnabled=!S.rotEnabled;render();});
  const ra=document.getElementById('rot-a');
  if(ra)ra.addEventListener('change',()=>{
    S.rotGrpA=ra.value;
    S.rotGrpB=S.groups.find(g=>g.id!==ra.value)?.id||S.groups[0]?.id;
  });
  document.querySelectorAll('input[data-acc]').forEach(el=>el.addEventListener('change',()=>{
    const acc=el.dataset.acc,gi=el.dataset.gid;
    if(el.checked){if(!S.accGrps[acc].includes(gi))S.accGrps[acc].push(gi);}
    else S.accGrps[acc]=S.accGrps[acc].filter(x=>x!==gi);
  }));
  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
    tab.classList.add('on');
    document.querySelectorAll('.acc-panel').forEach(p=>p.style.display='none');
    const p=document.getElementById('p'+tab.dataset.tab);
    if(p)p.style.display='';
  }));
  const bb=document.getElementById('btn-back');
  if(bb)bb.addEventListener('click',()=>{
    if(S.mode==='single')S.step=1;
    else S.step=Math.max(1,S.step-1);
    render();
  });
  const bn=document.getElementById('btn-next');
  if(bn)bn.addEventListener('click',()=>{
    if(S.step===1){
      const newNames=Object.keys(S.rawFiles).filter(n=>!S.strategies.find(s=>s.filename===n));
      if(!newNames.length){advance();return;}
      let pend=newNames.length;
      newNames.forEach(name=>parseFile(name,S.rawFiles[name],str=>{
        S.strategies.push(str);
        if(S.mode==='multi'&&S.groups.length&&!S.groups.some(g=>g.sids.includes(str.id)))S.groups[0].sids.push(str.id);
        if(--pend===0)advance();
      }));
    } else advance();
  });
}

function advance(){
  if(S.mode==='single'){S.step=2;}
  else if(S.step===1){S.step=2;}
  else if(S.step===2){S.step=3;}
  else{S.step=4;}
  render();
}

render();
</script>
</body>
</html>
